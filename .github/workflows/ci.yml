name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: baytalmosawer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/baytalmosawer_test?schema=public
      AUTH_SECRET: ci-test-auth-secret-minimum-32-characters
      NEXTAUTH_SECRET: ci-test-auth-secret-minimum-32-characters
      AUTH_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_PLATFORM_NAME: بيت المصور
      PAYMENT_PROVIDER: mock
      EMAIL_MOCK: "true"
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci --include=dev

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            npx prisma db execute --stdin <<< "SELECT 1" && exit 0
            sleep 2
          done
          echo "Postgres not ready"
          exit 1

      - run: npx prisma migrate deploy

      - run: npx tsx prisma/seed.ts

      - run: npm run test:unit

      - run: npm run lint

      - run: npm run build
        env:
          NODE_ENV: production

      - run: npx playwright install chromium --with-deps

      - run: npm run test:e2e
